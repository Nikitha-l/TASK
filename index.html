<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Calculator</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI, Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            background:linear-gradient(135deg,#6a11cb,#2575fc);
        }

        .calculator{
            width:350px;
            background:#1f2937;
            border-radius:20px;
            padding:20px;
            box-shadow:0 20px 40px rgba(0,0,0,0.4);
        }

        .title{
            color:white;
            text-align:center;
            margin-bottom:15px;
            font-size:26px;
            font-weight:bold;
        }

        .display{
            width:100%;
            height:70px;
            border:none;
            outline:none;
            border-radius:12px;
            background:#111827;
            color:#fff;
            text-align:right;
            font-size:32px;
            padding:15px;
            margin-bottom:20px;
        }

        .buttons{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:12px;
        }

        button{
            height:65px;
            border:none;
            border-radius:12px;
            font-size:22px;
            cursor:pointer;
            transition:0.2s;
            font-weight:bold;
        }

        button:hover{
            transform:scale(1.05);
        }

        .number{
            background:#374151;
            color:white;
        }

        .number:hover{
            background:#4b5563;
        }

        .operator{
            background:#3b82f6;
            color:white;
        }

        .operator:hover{
            background:#2563eb;
        }

        .clear{
            background:#ef4444;
            color:white;
        }

        .clear:hover{
            background:#dc2626;
        }

        .equal{
            background:#10b981;
            color:white;
            grid-column:span 2;
        }

        .equal:hover{
            background:#059669;
        }

        .zero{
            grid-column:span 2;
        }

        footer{
            text-align:center;
            color:#d1d5db;
            margin-top:18px;
            font-size:13px;
        }
    </style>
</head>
<body>

<div class="calculator">

    <div class="title">Calculator</div>

    <input type="text" id="display" class="display" readonly>

    <div class="buttons">

        <button class="clear" onclick="clearDisplay()">AC</button>
        <button class="operator" onclick="append('%')">%</button>
        <button class="operator" onclick="deleteLast()">⌫</button>
        <button class="operator" onclick="append('/')">÷</button>

        <button class="number" onclick="append('7')">7</button>
        <button class="number" onclick="append('8')">8</button>
        <button class="number" onclick="append('9')">9</button>
        <button class="operator" onclick="append('*')">×</button>

        <button class="number" onclick="append('4')">4</button>
        <button class="number" onclick="append('5')">5</button>
        <button class="number" onclick="append('6')">6</button>
        <button class="operator" onclick="append('-')">−</button>

        <button class="number" onclick="append('1')">1</button>
        <button class="number" onclick="append('2')">2</button>
        <button class="number" onclick="append('3')">3</button>
        <button class="operator" onclick="append('+')">+</button>

        <button class="number zero" onclick="append('0')">0</button>
        <button class="number" onclick="append('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>

    </div>

    <footer>Designed with ❤️</footer>

</div>

<script>

const display = document.getElementById("display");

function append(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function deleteLast(){
    display.value = display.value.slice(0,-1);
}

function calculate(){

    try{
        display.value = eval(display.value);
    }
    catch{
        display.value = "Error";
    }

}

document.addEventListener("keydown",function(e){

    if((e.key >= "0" && e.key <= "9") ||
       ['+','-','*','/','.','%'].includes(e.key))
    {
        append(e.key);
    }

    else if(e.key==="Enter"){
        e.preventDefault();
        calculate();
    }

    else if(e.key==="Backspace"){
        deleteLast();
    }

    else if(e.key==="Escape"){
        clearDisplay();
    }

});

</script>

</body>
</html>
